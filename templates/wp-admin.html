<!DOCTYPE html>
<html>
<head>
    <title>WordPress Login</title>
    <style>
        body {
            background-color: #f1f1f1;
            font-family: Arial;
        }
        .login-box {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            box-shadow: 0px 0px 10px gray;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }
        button {
            padding: 8px 15px;
            background: #0073aa;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #005177;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>WordPress</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Log In</button>
    </form>
</div>

</body>
</html>
